<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings Herco Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/admin/admin.css">
  <style>
    body { display: flex; }
    .layout-wrapper { display: flex; width: 100%; }
    #app { display: contents; }

    /* ── Ref Confirmation Step ── */
    .ref-confirm-step {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border, #e5e7eb);
    }

    .ref-confirm-step label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted, #6b7280);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .ref-confirm-step .ref-hint {
      font-size: 12px;
      color: var(--text-muted, #9ca3af);
      margin-bottom: 8px;
    }

    .ref-input-wrap {
      position: relative;
    }

    .ref-input-wrap input {
      width: 100%;
      padding: 10px 40px 10px 14px;
      border: 2px solid var(--border, #e5e7eb);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--bg-input);
      color: var(--text, #111827);
      box-sizing: border-box;
    }

    .ref-input-wrap input:focus {
      outline: none;
      border-color: var(--primary, #3b82f6);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }

    .ref-input-wrap input.ref-error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
    }

    .ref-input-wrap input.ref-success {
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.12);
    }

    .ref-input-wrap .ref-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
      display: none;
    }

    .ref-input-wrap.is-error .ref-icon.icon-error { display: block; color: #ef4444; }
    .ref-input-wrap.is-success .ref-icon.icon-success { display: block; color: #22c55e; }

    .ref-error-msg {
      font-size: 12px;
      color: #ef4444;
      margin-top: 6px;
      display: none;
    }

    .ref-input-wrap.is-error ~ .ref-error-msg {
      display: block;
    }

    /* Shake animation on wrong ref */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>

<div id="app">
  <div class="page-header">
    <div>
      <h1 class="page-title">Bookings</h1>
      <p class="page-sub">Manage all customer bookings</p>
    </div>
    <div class="page-actions">
      <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="bookingSearch" placeholder="Search by ref, name, or email...">
      </div>
      <select class="filter-select" id="bookingStatusFilter">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="in_progress">In Progress</option>
        <option value="done">Done</option>
        <option value="picked_up">Picked Up</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Ref #</th><th>Customer</th><th>Service</th><th>Date</th>
            <th>Amount</th><th>Payment</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="bookingsTableBody">
          <tr><td colspan="8"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Status Modal -->
<div class="modal-overlay" id="statusModal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Update Booking Status</h3>
      <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <p>Select new status for this booking:</p>
      <div class="status-options" id="statusOptions"></div>

      <!-- ── Ref Confirmation Step ── -->
      <div class="ref-confirm-step" id="refConfirmStep" style="display:none;">
        <label>Confirm Reference Number</label>
        <p class="ref-hint">Type the booking reference number to confirm this update.</p>
        <div class="ref-input-wrap" id="refInputWrap">
          <input
            type="text"
            id="refConfirmInput"
            placeholder="e.g. HRC-20240001"
            autocomplete="off"
            spellcheck="false"
          >
          <i class="fas fa-times-circle ref-icon icon-error"></i>
          <i class="fas fa-check-circle ref-icon icon-success"></i>
        </div>
        <p class="ref-error-msg" id="refErrorMsg">Reference number doesn't match. Please check and try again.</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" id="modalCancel">Cancel</button>
      <button class="btn-primary" id="modalConfirm" disabled>Confirm</button>
    </div>
  </div>
</div>

<script src="/admin/admin-layout.js"></script>
<script>
  AdminLayout.init({ activePage: 'bookings', breadcrumb: 'Bookings' });

  const { statusBadge, formatCurrency, formatDate } = AdminLayout;

  // ── State ─────────────────────────────────────────────
  let currentBookingId  = null;
  let selectedStatus    = null;
  let currentRefCode    = null;   // <-- stores the ref of the booking being updated

  const statusFlow = {
    pending:     [{ value: 'in_progress', label: 'Mark In Progress', icon: 'fas fa-tools' }],
    in_progress: [{ value: 'done',        label: 'Mark Done',        icon: 'fas fa-check-circle' }],
    done:        [{ value: 'picked_up',   label: 'Mark Picked Up',   icon: 'fas fa-motorcycle' }],
    picked_up:   [],
  };

  // ── Open Modal ────────────────────────────────────────
  function openStatusModal(bookingId, currentStatus, refCode) {
    currentBookingId = bookingId;
    selectedStatus   = null;
    currentRefCode   = refCode;

    document.getElementById('modalTitle').textContent = `Update: ${refCode}`;

    const options    = document.getElementById('statusOptions');
    const confirmBtn = document.getElementById('modalConfirm');
    const refStep    = document.getElementById('refConfirmStep');

    // Reset ref confirmation
    resetRefInput();
    refStep.style.display = 'none';
    confirmBtn.disabled   = true;

    const nextStatuses = statusFlow[currentStatus] || [];
    if (!nextStatuses.length) {
      options.innerHTML = '<p style="color:var(--text-muted);font-size:13px;">No further updates available.</p>';
      confirmBtn.style.display = 'none';
    } else {
      confirmBtn.style.display = 'inline-flex';
      options.innerHTML = nextStatuses.map(s => `
        <div class="status-option" data-value="${s.value}" onclick="selectStatus(this,'${s.value}')">
          <i class="${s.icon}"></i> ${s.label}
        </div>`).join('');
    }

    document.getElementById('statusModal').style.display = 'flex';
  }

  // ── Select Status → show ref input ───────────────────
  function selectStatus(el, value) {
    document.querySelectorAll('.status-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    selectedStatus = value;

    // Show the ref confirmation step
    const refStep = document.getElementById('refConfirmStep');
    refStep.style.display = 'block';
    resetRefInput();
    document.getElementById('refConfirmInput').focus();
  }

  // ── Ref Input Validation ──────────────────────────────
  function resetRefInput() {
    const input   = document.getElementById('refConfirmInput');
    const wrap    = document.getElementById('refInputWrap');
    const errMsg  = document.getElementById('refErrorMsg');
    const confirm = document.getElementById('modalConfirm');

    if (input)   { input.value = ''; input.className = ''; }
    if (wrap)    { wrap.className = 'ref-input-wrap'; }
    if (errMsg)  { errMsg.style.display = 'none'; }
    if (confirm) { confirm.disabled = true; }
  }

  document.getElementById('refConfirmInput')?.addEventListener('input', function () {
    const typed   = this.value.trim().toUpperCase();
    const target  = (currentRefCode || '').trim().toUpperCase();
    const wrap    = document.getElementById('refInputWrap');
    const errMsg  = document.getElementById('refErrorMsg');
    const confirm = document.getElementById('modalConfirm');

    if (!typed) {
      wrap.className    = 'ref-input-wrap';
      errMsg.style.display = 'none';
      confirm.disabled  = true;
      return;
    }

    if (typed === target) {
      wrap.className       = 'ref-input-wrap is-success';
      errMsg.style.display = 'none';
      confirm.disabled     = false;
    } else {
      wrap.className       = 'ref-input-wrap is-error';
      errMsg.style.display = 'block';
      confirm.disabled     = true;
    }
  });

  // ── Close Modal ───────────────────────────────────────
  const closeModal = () => {
    document.getElementById('statusModal').style.display = 'none';
    resetRefInput();
  };

  document.getElementById('modalClose')?.addEventListener('click', closeModal);
  document.getElementById('modalCancel')?.addEventListener('click', closeModal);
  document.getElementById('statusModal')?.addEventListener('click', e => {
    if (e.target.id === 'statusModal') closeModal();
  });

  // ── Confirm Update ────────────────────────────────────
  document.getElementById('modalConfirm')?.addEventListener('click', async () => {
    if (!selectedStatus || !currentBookingId) { alert('Select a status first.'); return; }

    // Double-check ref before firing API (safety net)
    const typed  = (document.getElementById('refConfirmInput')?.value || '').trim().toUpperCase();
    const target = (currentRefCode || '').trim().toUpperCase();
    if (typed !== target) {
      const wrap = document.getElementById('refInputWrap');
      wrap.classList.add('shake');
      wrap.addEventListener('animationend', () => wrap.classList.remove('shake'), { once: true });
      return;
    }

    const confirmBtn = document.getElementById('modalConfirm');
    confirmBtn.disabled = true;
    confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

    try {
      const res  = await fetch(`/api/admin/bookings/${currentBookingId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: selectedStatus }),
      });
      const data = await res.json();
      if (data.success) { closeModal(); loadBookings(); }
      else alert('Failed: ' + (data.message || 'Unknown error'));
    } catch (err) {
      alert('Network error. Please try again.');
    } finally {
      confirmBtn.disabled = false;
      confirmBtn.innerHTML = 'Confirm';
    }
  });

  // ── Load Bookings ─────────────────────────────────────
  async function loadBookings() {
    const status = document.getElementById('bookingStatusFilter')?.value || '';
    const search = document.getElementById('bookingSearch')?.value || '';
    const params = new URLSearchParams();
    if (status) params.set('status', status);
    if (search) params.set('search', search);

    const tbody = document.getElementById('bookingsTableBody');
    tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></div></td></tr>`;

    try {
      const res  = await fetch('/api/admin/bookings?' + params.toString());
      const data = await res.json();
      if (!data.success || !data.data.length) {
        tbody.innerHTML = `<tr><td colspan="8"><div class="empty-state"><i class="fas fa-search"></i><p>No bookings found</p></div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.data.map(b => `
        <tr>
          <td><strong>${b.reference_code || '—'}</strong></td>
          <td><strong>${b.guest_name || b.user_name || '—'}</strong><br><small>${b.guest_email || ''}</small></td>
          <td>${b.service_name || '—'} ${b.variant_name ? `<small>(${b.variant_name})</small>` : ''}</td>
          <td>${formatDate(b.booking_date)}</td>
          <td>${formatCurrency(b.total_price || b.variant_price)}</td>
          <td>${b.payment_method === 'cash'
            ? '<span class="status-badge status-staff">Cash</span>'
            : '<span class="status-badge status-info">Online</span>'}</td>
          <td>${statusBadge(b.status)}</td>
          <td>
            <button class="action-btn" onclick="openStatusModal('${b.id}','${b.status}','${b.reference_code}')">
              <i class="fas fa-edit"></i> Update
            </button>
          </td>
        </tr>`).join('');
    } catch (err) {
      console.error('Load bookings error:', err);
    }
  }

  ['bookingSearch', 'bookingStatusFilter'].forEach(id => {
    document.getElementById(id)?.addEventListener('input', loadBookings);
  });

  loadBookings();
</script>
</body>
</html>
